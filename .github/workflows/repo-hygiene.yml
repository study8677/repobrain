name: Repo Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Check repository contract
        run: python scripts/check_repo_contract.py
