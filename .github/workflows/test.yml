name: Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  engine-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./engine[dev]"

      - name: Run engine tests
        run: pytest engine/tests/

      - name: Verify engine entrypoints
        run: |
          rb-ask --help
          rb-refresh --help
          rb-mcp --help
          python -m repobrain_engine --help
          python -m repobrain_engine.hub --help

  docker-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Build main Dockerfile
        run: docker build -t rb-ci-test .

      - name: Build sandbox Dockerfile
        run: docker build -f Dockerfile.sandbox -t rb-sandbox-ci-test .

  cli-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CLI and engine
        run: |
          python -m pip install --upgrade pip
          pip install "./engine[dev]" ./cli

      - name: Run CLI tests
        run: pytest cli/tests/

      - name: Verify CLI commands
        run: |
          rb --help
          rb ask --help
          rb refresh --help
          rb doctor --help
          rb version

  install-golden-path:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install clean-room test dependency
        run: python -m pip install --upgrade pip pipx

      - name: Verify fresh install and v0.3.0 upgrade
        run: python scripts/check_clean_install.py --mode all --from-tag v0.3.0
