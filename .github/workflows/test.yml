# Optional repository secrets (Settings → Secrets and variables → Actions):
#
# POSTGRES_URL
#   Same pooled Postgres URL as production Vercel (Prisma). When set, the "Prisma migrate deploy"
#   step runs on every workflow (push/PR to main). Forks without this secret skip migrate (step succeeds).
#
# Not added by automation — you must paste the value in the GitHub UI (or gh secret set).
#
# Optional PR review: Cursor Bugbot (free tier) — https://cursor.com/docs/bugbot#setup
#
name: Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # Infisical OIDC (short-lived, no GitHub secrets)

jobs:
  test:
    runs-on: ubuntu-latest
    # GitHub Actions: run JS-based actions on Node 24 (see 2025–2026 Node 20 deprecation notice).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # Pinned SHAs (supply chain): tag v6 — bump via `gh api repos/actions/checkout/commits/refs/tags/v6 --jq .sha`
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    # Infisical is the authority for the small initial slice:
    # - POSTGRES_URL
    # - SOVEREIGN_SESSION_SECRET
    # - CORPFLOW_TENANT_PREVIEW_SECRET
    # - CORPFLOW_CLOUDINARY_CLOUD_NAME / API_KEY / API_SECRET
    #
    # This uses OIDC (no long-lived credentials stored in GitHub Secrets).
    # Identity ID is NOT a secret; it's safe to commit.
    - name: Fetch secrets from Infisical (OIDC)
      uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058
      with:
        method: "oidc"
        identity-id: "${{ vars.INFISICAL_IDENTITY_ID }}"
        project-slug: "${{ vars.INFISICAL_PROJECT_SLUG }}"
        env-slug: "${{ vars.INFISICAL_ENV_SLUG }}"
        domain: "${{ vars.INFISICAL_DOMAIN }}"

    # Vercel Hobby rejects crons that run more than once per day; bad config blocks ALL production deploys.
    - name: Vercel Hobby cron guard (vercel.json)
      run: node scripts/validate-vercel-hobby-crons.mjs

    - name: Set up Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r core/engine/requirements.txt
        
    - name: Run Tests (Python engine)
      run: |
        pytest core/engine/tests/

    - name: Set up Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: "22"
        cache: npm

    - name: Node dependencies + automation unit tests
      run: |
        npm ci
        npm test

    # When POSTGRES_URL is configured as a repo secret, apply pending Prisma migrations (no-op if none).
    - name: Prisma migrate deploy (optional)
      run: |
        if [ -z "$POSTGRES_URL" ]; then
          echo "Skip: POSTGRES_URL not available (Infisical not configured for this workflow/env)."
        else
          npx prisma migrate deploy
        fi

    # `high` fails often on transitive dev/build deps (e.g. Next toolchain) while fixes lag.
    # Block on critical only; run `npm audit` locally or in Dependabot for full visibility.
    - name: npm audit (critical severity+)
      run: npm audit --audit-level=critical

    - name: Next.js production build
      run: npm run build
