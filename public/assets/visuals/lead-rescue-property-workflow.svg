<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 200"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-hidden="true"
  font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
>
  <title>AI Lead Rescue property edition - workflow ribbon</title>
  <desc>Five thin nodes connected on a single horizontal hairline. Left to right: a cluster of small dots representing channels (WhatsApp, Facebook, website, listing portal, calls); a small rectangle for the lead log; a chevron mark for the owner alert; a small grid for the follow-up board; a single hairline with a dot for the daily summary. Cream background, deep teal lines, brushed brass register marks. No people, no logos, no photography.</desc>

  <defs>
    <linearGradient id="lr-prop-flow-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(15, 76, 76, 0.0)"/>
      <stop offset="10%" stop-color="rgba(15, 76, 76, 0.45)"/>
      <stop offset="90%" stop-color="rgba(15, 76, 76, 0.45)"/>
      <stop offset="100%" stop-color="rgba(15, 76, 76, 0.0)"/>
    </linearGradient>
    <linearGradient id="lr-prop-flow-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6F0"/>
      <stop offset="100%" stop-color="#F6EFE2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#lr-prop-flow-bg)"/>

  <line x1="120" y1="100" x2="1080" y2="100" stroke="url(#lr-prop-flow-rule)" stroke-width="1"/>

  <g fill="rgba(156, 122, 61, 0.75)">
    <circle cx="270" cy="100" r="1.6"/>
    <circle cx="510" cy="100" r="1.6"/>
    <circle cx="750" cy="100" r="1.6"/>
    <circle cx="990" cy="100" r="1.6"/>
  </g>

  <g stroke="rgba(15, 76, 76, 0.85)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(150, 100)">
      <circle cx="0"   cy="0" r="22" fill="rgba(15, 76, 76, 0.04)" stroke-width="1"/>
      <circle cx="-9"  cy="-7" r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="9"   cy="-7" r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="-12" cy="2"  r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="0"   cy="3"  r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="12"  cy="2"  r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="-5"  cy="11" r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="6"   cy="11" r="2.2" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
    </g>

    <g transform="translate(390, 100)">
      <rect x="-22" y="-16" width="44" height="32" rx="2" fill="rgba(15, 76, 76, 0.04)"/>
      <line x1="-14" y1="-7" x2="14"  y2="-7"/>
      <line x1="-14" y1="0"  x2="10"  y2="0"/>
      <line x1="-14" y1="7"  x2="6"   y2="7"/>
    </g>

    <g transform="translate(630, 100)">
      <circle cx="0" cy="0" r="20" fill="rgba(15, 76, 76, 0.04)" stroke-width="1"/>
      <path d="M -10 -2 L 0 -10 L 10 -2"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
      <circle cx="0" cy="14" r="1.6" fill="rgba(156, 122, 61, 0.85)" stroke="none"/>
    </g>

    <g transform="translate(870, 100)">
      <rect x="-22" y="-16" width="44" height="32" rx="2" fill="rgba(15, 76, 76, 0.04)"/>
      <line x1="-22" y1="-6" x2="22" y2="-6"/>
      <line x1="-7"  y1="-16" x2="-7" y2="16"/>
      <line x1="7"   y1="-16" x2="7"  y2="16"/>
      <circle cx="-15" cy="3"  r="1.4" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
      <circle cx="0"   cy="3"  r="1.4" fill="rgba(156, 122, 61, 0.85)" stroke="none"/>
      <circle cx="15"  cy="3"  r="1.4" fill="rgba(15, 76, 76, 0.85)" stroke="none"/>
    </g>

    <g transform="translate(1070, 100)">
      <rect x="-22" y="-16" width="44" height="32" rx="2" fill="rgba(15, 76, 76, 0.04)"/>
      <line x1="-14" y1="-7" x2="14"  y2="-7"/>
      <line x1="-14" y1="0"  x2="14"  y2="0"/>
      <line x1="-14" y1="7"  x2="14"  y2="7"/>
      <circle cx="14" cy="-7" r="1.6" fill="rgba(156, 122, 61, 0.85)" stroke="none"/>
    </g>
  </g>

  <g font-size="11" font-weight="700" fill="rgba(15, 76, 76, 0.85)" text-anchor="middle" letter-spacing="0.22em">
    <text x="150"  y="160">CHANNELS</text>
    <text x="390"  y="160">LEAD LOG</text>
    <text x="630"  y="160">ALERT</text>
    <text x="870"  y="160">FOLLOW-UP</text>
    <text x="1070" y="160">SUMMARY</text>
  </g>

  <g font-size="9" fill="rgba(26, 26, 26, 0.40)" text-anchor="middle" letter-spacing="0.16em">
    <text x="150"  y="178">WhatsApp - FB - site - listing - calls</text>
    <text x="390"  y="178">single time-stamped record</text>
    <text x="630"  y="178">owner / operator</text>
    <text x="870"  y="178">replied - awaiting - stale</text>
    <text x="1070" y="178">morning view</text>
  </g>
</svg>
