<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" role="img" aria-label="Fourteen-day CorpFlowAI client onboarding journey: intake submitted, operator review, decision and scoping, invoice and 48-hour pilot setup, seven-day pilot monitoring, pilot review meeting, continue or close." preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="cf-onboard-track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#7dd3fc" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="80" y="40" fill="#7dd3fc" font-size="11" letter-spacing="0.18em">DAY 0</text>
    <text x="1000" y="40" fill="#5eead4" font-size="11" letter-spacing="0.18em" text-anchor="end">DAY 14</text>

    <line x1="80" y1="120" x2="1000" y2="120" stroke="url(#cf-onboard-track)" stroke-width="1.5"/>

    <g>
      <line x1="80"  y1="112" x2="80"  y2="128" stroke="rgba(125,211,252,0.55)" stroke-width="1"/>
      <line x1="220" y1="112" x2="220" y2="128" stroke="rgba(125,211,252,0.40)" stroke-width="1"/>
      <line x1="360" y1="112" x2="360" y2="128" stroke="rgba(125,211,252,0.40)" stroke-width="1"/>
      <line x1="500" y1="112" x2="500" y2="128" stroke="rgba(125,211,252,0.40)" stroke-width="1"/>
      <line x1="700" y1="112" x2="700" y2="128" stroke="rgba(125,211,252,0.40)" stroke-width="1"/>
      <line x1="900" y1="112" x2="900" y2="128" stroke="rgba(125,211,252,0.40)" stroke-width="1"/>
      <line x1="1000" y1="112" x2="1000" y2="128" stroke="rgba(45,212,191,0.65)" stroke-width="1"/>
    </g>

    <g>
      <circle cx="80"  cy="120" r="9" fill="rgba(125,211,252,0.14)" stroke="rgba(125,211,252,0.65)" stroke-width="1.2"/>
      <circle cx="220" cy="120" r="7" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.50)" stroke-width="1.1"/>
      <circle cx="360" cy="120" r="7" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.50)" stroke-width="1.1"/>
      <circle cx="500" cy="120" r="7" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.50)" stroke-width="1.1"/>
      <rect  x="650" y="113" width="100" height="14" rx="7" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.45)" stroke-width="1"/>
      <circle cx="900" cy="120" r="7" fill="rgba(125,211,252,0.10)" stroke="rgba(125,211,252,0.50)" stroke-width="1.1"/>
      <circle cx="1000" cy="120" r="9" fill="rgba(45,212,191,0.16)" stroke="rgba(45,212,191,0.70)" stroke-width="1.3"/>
    </g>

    <g font-size="12" fill="#eef6ff" font-weight="600" text-anchor="middle">
      <text x="80"  y="160">Intake</text>
      <text x="220" y="160">Review</text>
      <text x="360" y="160">Decision</text>
      <text x="500" y="160">Setup</text>
      <text x="700" y="160">Pilot monitoring</text>
      <text x="900" y="160">Review meeting</text>
      <text x="1000" y="160">Continue or close</text>
    </g>
    <g font-size="11" fill="#9fb2c8" text-anchor="middle">
      <text x="80"  y="178">Day 0</text>
      <text x="220" y="178">Day 1</text>
      <text x="360" y="178">Day 2</text>
      <text x="500" y="178">Day 3-5</text>
      <text x="700" y="178">Day 6-12</text>
      <text x="900" y="178">Day 13</text>
      <text x="1000" y="178">Day 14</text>
    </g>
    <g font-size="10.5" fill="#7d96ad" text-anchor="middle">
      <text x="80"  y="200">submitted</text>
      <text x="220" y="200">by an operator</text>
      <text x="360" y="200">scoping written</text>
      <text x="500" y="200">after invoice</text>
      <text x="700" y="200">operator-watched</text>
      <text x="900" y="200">with the owner</text>
      <text x="1000" y="200">together</text>
    </g>
  </g>
</svg>
